name: Daily Giveaway Bot

on:
  push:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

concurrency:
  group: giveaway-bot-daily
  cancel-in-progress: false

jobs:
  run-bots:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      actions: read
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Restore rolling history from previous run artifact
        uses: dawidd6/action-download-artifact@v6
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: daily-bot.yml
          branch: ${{ github.ref_name }}
          name: giveaway-bot-status
          path: .
          if_no_artifact_found: warn

      - name: Ensure history/status paths exist
        run: |
          mkdir -p logs
          test -f logs/giveaway_history.json || echo "[]" > logs/giveaway_history.json
          test -f logs/goodreads_state.json || echo "{}" > logs/goodreads_state.json
          test -f logs/storygraph_state.json || echo "{}" > logs/storygraph_state.json

      - name: Run daily sweep (one-shot)
        env:
          GOODREADS_USERNAME: ${{ secrets.GOODREADS_USERNAME }}
          GOODREADS_PASSWORD: ${{ secrets.GOODREADS_PASSWORD }}
          GOODREADS_STORAGE_STATE_JSON: ${{ secrets.GOODREADS_STORAGE_STATE_JSON }}
          GOODREADS_STORAGE_STATE_B64: ${{ secrets.GOODREADS_STORAGE_STATE_B64 }}
          STORYGRAPH_USERNAME: ${{ secrets.STORYGRAPH_USERNAME }}
          STORYGRAPH_PASSWORD: ${{ secrets.STORYGRAPH_PASSWORD }}
          STORYGRAPH_STORAGE_STATE_JSON: ${{ secrets.STORYGRAPH_STORAGE_STATE_JSON }}
          STORYGRAPH_STORAGE_STATE_B64: ${{ secrets.STORYGRAPH_STORAGE_STATE_B64 }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python main.py --mode once

      - name: Upload status artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: giveaway-bot-status
          path: |
            bot_status.json
            logs/giveaway_history.json
            logs/goodreads_state.json
            logs/storygraph_state.json
          if-no-files-found: warn
