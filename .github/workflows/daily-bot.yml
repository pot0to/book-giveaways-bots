name: Daily Giveaway Bot

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

concurrency:
  group: giveaway-bot-daily
  cancel-in-progress: false

jobs:
  run-bots:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Run daily sweep (one-shot)
        env:
          GOODREADS_USERNAME: ${{ secrets.GOODREADS_USERNAME }}
          GOODREADS_PASSWORD: ${{ secrets.GOODREADS_PASSWORD }}
          STORYGRAPH_USERNAME: ${{ secrets.STORYGRAPH_USERNAME }}
          STORYGRAPH_PASSWORD: ${{ secrets.STORYGRAPH_PASSWORD }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python main.py --mode once

      - name: Upload status artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: giveaway-bot-status-${{ github.run_id }}
          path: |
            bot_status.json
            logs/giveaway_history.json
          if-no-files-found: warn
